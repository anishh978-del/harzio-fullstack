
<!DOCTYPE html>
<html>

<head>
<title>Employee Management System</title>
<link rel="stylesheet" href="style.css">

</head>

<body>
    <button onclick="logout()" style="background:red;color:white;">
  Logout
</button>

<div class="container">

<h1>Employee Database Management System</h1>


<input id="name" placeholder="Employee Name">
<input id="email" placeholder="Email">
<input id="department" placeholder="Department">
<input id="salary" placeholder="Salary">

<button onclick="addEmployee()">
Add Employee
</button>


<h2>Employee List</h2>


<input id="editId" type="hidden">

<input id="editName" placeholder="Edit Name">
<input id="editEmail" placeholder="Edit Email">
<input id="editDepartment" placeholder="Edit Department">
<input id="editSalary" placeholder="Edit Salary">

<button onclick="updateEmployee()">
Update Employee
</button>


<table>

<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Department</th>
<th>Salary</th>
<th>Action</th>
</tr>
</thead>


<tbody id="employeeList">

</tbody>

</table>


</div>

</body>
<script src="script.js" defer></script>
</html>
