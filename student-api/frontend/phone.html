<!DOCTYPE html>
<html>
<head>
  <title>Phone Login</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

<div class="container">

  <h2>Phone Login 📱</h2>

  <input type="text" id="phone" placeholder="Enter number (10 digits)">

  <button onclick="sendOTP()">Send OTP</button>

  <div id="otpBox" style="display:none;">
    <input type="text" id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify OTP</button>
  </div>

  <p id="result"></p>

  <button onclick="window.location.href='/frontend/login.html'">
    Back to Login
  </button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA0tldlLxPTMBa4fMv5JLeGa026b4BFel8",
  authDomain: "crud-b4007.firebaseapp.com",
  projectId: "crud-b4007"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let confirmationResult;

// SEND OTP
window.sendOTP = async function () {

  const phone = "+91" + document.getElementById("phone").value;

  window.recaptchaVerifier = new RecaptchaVerifier(auth, "result", {
    size: "invisible"
  });

  try {
    confirmationResult = await signInWithPhoneNumber(
      auth,
      phone,
      window.recaptchaVerifier
    );

    document.getElementById("otpBox").style.display = "block";
    document.getElementById("result").innerText = "OTP sent 📩";

  } catch (err) {
    document.getElementById("result").innerText = err.message;
  }
};

// VERIFY OTP
window.verifyOTP = async function () {

  const code = document.getElementById("otp").value;

  try {
    const result = await confirmationResult.confirm(code);

    localStorage.setItem("user", JSON.stringify(result.user));

    window.location.href = "index.html";

  } catch (err) {
    document.getElementById("result").innerText = err.message;
  }
};
</script>

</body>
</html>
